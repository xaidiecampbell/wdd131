<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazyload Demonstration</title>
    <meta name="description"
        content="Lazyload practice with 6 images">
    <meta name="author" content="Xaidie Cambpell">
    <script src="scripts/lazyload.js" defer></script>
    <link rel="stylesheet" href="styles/lazyload.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <h1>Lazyloading 7 Images</h1>
        <figure>
        <img src="images/M22.webp" alt="Bus stop friends" loading="lazy" max-width="400" max-height="600">
        <figcaption>Bus stop friends</figcaption>
        </figure>
        <figure>
        <img src="images/M23.webp" alt="Captive Robot" loading="lazy" max-width="400" max-height="600">
        <figcaption>Captive Robot</figcaption>
        </figure>
        <figure>
        <img src="images/M24.webp" alt="Scary Bunny with big sharp teeth and trainer" loading="lazy" max-width="400" max-height="600">
        <figcaption>Scary Bunny with big sharp teeth and trainer</figcaption>
        </figure>
        <figure>
        <img src="images/m25.webp" alt="Super bunny angel" loading="lazy" max-width="400" max-height="600">
        <figcaption>Super bunny angel</figcaption>
        </figure>
        <figure>
        <img src="images/m26.webp" alt="Lost Masked Bunny" loading="lazy" max-width="400" max-height="600">
        <figcaption>Lost Masked Bunny</figcaption>
        </figure>
        <figure>
        <img src="images/m28.webp" alt="Star Bunny with no mask" loading="lazy" max-width="400" max-height="600">
        <figcaption>Star Bunny with no mask</figcaption>
        </figure>
        <figure>
        <img src="images/m27.webp" alt="Super Bunny surfing" loading="lazy" max-width="400" max-height="600">
        <figcaption>Super Bunny surfing</figcaption>
        </figure>

    </main>
</body>
