<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="description" content="This form is a practice to create a Product Review Form">
    <meta name="author" content="Xaidie Campbell">

    <title>Product Review Form</title>

    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- STYLE SHEETS -->
    <link href="styles/form.css" rel="stylesheet">
    <script src="scripts/form.js" defer></script>
    <!-- phone-default -->
    <!-- <link href="css/small.css" rel="stylesheet"> -->
    <!-- enhance-tablet -->
    <!-- <link href="css/medium.css" rel="stylesheet"> -->
    <!-- enhance-desktop -->
    <!-- <link href="css/large.css" rel="stylesheet"> -->



</head>

<body>
   <header>
    <h1>Product Review</h1>
   </header>

    <main>
        <form method="get" action="review.html" class="wf1">
            <fieldset>
                <legend>Product Name*</legend>
                <label>
                    <select name="Product" id="options" required>
                        <option value="" disabled selected>Select a product &#9662;</option>
                        <option value="motherslg" >Large Mother's Care Kit</option>
                        <option value="mothersmd" >Medium Mother's Care Kit</option>
                        <option value="motherssm" >Small Mother's Care Kit</option>
                        <option value="book" >Jellybean Book</option>
                        <option value="coloring" >Coloring Book Set</option>
                        <option value="dinosaur" >Stuffed Animal Dinosaur</option>
                        <option value="fatticorn" >Stuffed Animal Fatticorn</option>
                        <option value="carekit" >Self Care Kit</option>
                        
                    </select>
                </label>
            </fieldset>
            <fieldset>
                <legend>Overall Rating*</legend>
            
                <div class="rating-option">
                    <input type="radio" name="star" id="star1" value="1" required>
                    <label for="star1">☆</label>
                </div>
            
                <div class="rating-option">
                    <input type="radio" name="star" id="star2" value="2">
                    <label for="star2">☆☆</label>
                </div>
            
                <div class="rating-option">
                    <input type="radio" name="star" id="star3" value="3">
                    <label for="star3">☆☆☆</label>
                </div>
            
                <div class="rating-option">
                    <input type="radio" name="star" id="star4" value="4">
                    <label for="star4">☆☆☆☆</label>
                </div>
            
                <div class="rating-option">
                    <input type="radio" name="star" id="star5" value="5">
                    <label for="star5">☆☆☆☆☆</label>
                </div>
            
            </fieldset>
            <fieldset>
                <legend>Date of Purchase*</legend>
                <input type="date" name="purchaseDate" class="wf1" required>
                <label for="date"></label>
            </fieldset>
            <fieldset>
                <legend>What did you like best about the product?*</legend>
                <div class="rating-option">
                    <input type="checkbox" id="quality" name="quality" value="yes" class="wf1" >
                    <label for="quality">The quality</label>
                </div>
                <div class="rating-option">
                    <input type="checkbox" id="relax" name="relax" value="yes" class="wf1">
                    <label for="relax">It helped me relax</label>
                </div>
                <div class="rating-option">
                    <input type="checkbox" id="value" name="value" value="yes" class="wf1">
                    <label for="value">It was good value for the price</label>
                </div>
                <div class="rating-option">
                    <input type="checkbox" id="design" name="design" value="yes" class="wf1">
                    <label for="design">It was beautiful</label>
                </div>
            </fieldset>
            <fieldset>
                <legend>Please tell us what you thought of our product.</legend>
                    <input type="textarea" id="review-product" name="reviewproduct" value="review product" class="wf1">
            </fieldset>
            <fieldset>
                <legend>Your Name</legend>
                    <label><input type="text" id="name" name="name" value="name" class="wf1"> </label>
            </fieldset>
                <input type="submit" value="Review Product" class="button">
        </form>
    </main>
    <footer>
        <p>@<span id="currentYear"></span> 🌼 Xaidie Campbell 🌼 Worcester, Massachusetts</p>
        <p><span id="lastModified"></span></p>
    </footer>
    
</body>

</html>
