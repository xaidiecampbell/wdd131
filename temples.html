<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Temples Photo Album</title>
    <meta name="description" content="Temple Album that shows nine temples around the world. some of them have special meaning to the author. Others are just pretty.">
    <meta name="author" content="Xaidie Cambpell">
    <script src="scripts/temples.js" defer></script>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Temple Album</h1>

        <nav>
            <button id="menuBtn">☰</button>
            <ul id="navMenu">
                <li><a href="home">Home</a></li>
                <li><a href="Old">Old</a></li>
                <li><a href="New">New</a></li>
                <li><a href="Large">Large</a></li>
                <li><a href="Small">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        
        <figure>
            <img src="images/albuquerque-temple.webp" alt="Albuquerque LDS Temple">
            <figcaption>Albuquerque NM Temple</figcaption>
        </figure>
        <figure>
            <img src="images/bangkok-temple.webp" alt="Bangkok LDS Temple">
            <figcaption>Bangkok City Temple</figcaption>
        </figure>
        <figure>
            <img src="images/boise-temple.webp" alt="Boise LDS Temple">
            <figcaption>Boise ID Temple</figcaption>
        </figure>
        <figure>
            <img src="images/boston-temple.webp" alt="Boston LDS Temple">
            <figcaption>Boston MA Temple</figcaption>
        </figure>
        <figure>
            <img src="images/freiberg-temple.webp" alt="Freiberg LDS Temple">
            <figcaption>Freiberg Temple</figcaption>
        </figure>
        <figure>
            <img src="images/hong-kong-temple.webp" alt="Hong Kong LDS Temple">
            <figcaption>Hong Kong Temple</figcaption>
        </figure>
        <figure>
            <img src="images/kyiv-temple.jpg" alt="Kyiv LDS Temple">
            <figcaption>Kyiv Temple</figcaption>
        </figure>
        <figure>
            <img src="images/manhattan_temple.webp" alt="Manhattan LDS Temple">
            <figcaption>Manhattan Temple</figcaption>
        </figure>
        <figure>
            <img src="images/arequipa-temple.webp" alt="Arequipa LDS Temple">
            <figcaption>Arequipa Temple</figcaption>
        </figure>
    </main>
    <footer>
        <p>@<span id="currentYear"></span>🌼 Xaidie Campbell 🌼 USA</p>
        <p><span id="lastModified"></span></p>
